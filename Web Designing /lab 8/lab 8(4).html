<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
  </head>
  <body>
    <form>
      <label for="name">name</label><br /><br />
      <input
        type="text"
        id="name"
        name="name"
        placeholder="enter name"
        pattern="[a-zA-Z0-9]{2,14}"
        title="name"
        required
      /><br /><br />
      <label for="email">Email:(abc@gmail.com)</label><br /><br />
      <input
        type="email"
        id="email"
        name="email id"
        placeholder="email id"
        title="email id"
        value="abc@gmail.com"
        pattern="[a-zA-Z0-9]+@[a-zA-Z0-9]+\.[a-zA-Z]{2,27}"
        required
      /><br /><br />
      <label for="mobileno">mobile no:[0-9]{10}</label><br /><br />
      <input
        type="tel"
        id="mobileno"
        name="mobile no"
        placeholder="mobile no."
        title="mobile no."
        pattern="[0-9]{10}"
        required
      /><br /><br />
      <label for="date of birth">date of birth</label><br /><br />
      <input
        type="date"
        id="date of birth"
        name="date of birth"
        placeholder="date"
        required
      /><br /><br />
      <label for="adress">adress</label><br /><br />
      <textarea
        name="adress"
        id="adress"
        rows="5"
        cols="50"
        required
        minlength="2"
        maxlength="20"
      ></textarea
      ><br /><br />
      <label for="rank">rank</label><br /><br />
      <input type="number" id="rank" name="rank" min="1" max="10" />
      <br /><br />

      <input type="submit" value="submit" />
      <input type="reset" value="cancel" />
    </form>
  </body>
</html>
