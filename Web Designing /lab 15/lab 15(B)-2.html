<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            border: 2px solid #ccc;
            padding: 10px;
            outline: none;
        }
            input:focus {
            border-color: #4a90e2;
            background-color: yellow;
            box-shadow: 0 0 6px rgba(74, 144, 226 ,1);
        }
    </style>
</head>
<body>
    <form>
    <input type="text" placeholder="Enter your name" style="z-index: 100;">
    <input type="email" placeholder="Enter your email" style="z-index: 100;">
    <input type="password" placeholder="Password" style="z-index: 100;">
</form>
</body>
</html>
