<!DOCTYPE html>
<html>
<head>
    <title>Vegetable Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 800px;
            height: 400px;
            border-collapse: collapse;
            text-align: center;
        }

        td {
            border: 2px solid black;
            font-size: 28px;
            font-style: italic;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td rowspan="2">Batatas</td>
        <td rowspan="3">Couves</td>
        <td>Alhos</td>
        <td>Cebolas</td>
    </tr>
    <tr>
        <td colspan="2" rowspan="2">Alface</td>
    </tr>
    <tr>
        <td>Nabos</td>
    </tr>
</table>

</body>
</html>
