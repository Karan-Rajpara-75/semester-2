<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<main class="main row">
<div class="left col-6">
        <h1 class="h1 text-center">Student Registration</h1>
        
        <div class="input-group flex-nowrap">
            <h4 class="col-3">Full Name</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Username" aria-label="Username" aria-describedby="addon-wrapping">
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">Email</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Email" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">Mobile No.</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Mobile" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">Address</h4>
            <textarea class="form-control col-9" placeholder="Address" id="floatingTextarea2" style="height: 100px"></textarea>
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">Nationality</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Nationality" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">Date of Birth</h4>
            <input type="date" class="form-control  mb-3 col-9" placeholder="Date of Birth" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <div class="input-group mb-3">
        <h4 class="col-3">Gender</h4>
        <div class="input-group col-9">
  <input class="form-check-input col-9" type="checkbox" value="" id="defaultCheck1">
  <label class="form-check-label col-9" for="defaultCheck1">
    Male
  </label>
</div>
<div class="input-group col-9">
  <input class="form-check-input col-9" type="checkbox" value="" id="defaultCheck2" disabled>
  <label class="form-check-label col-9" for="defaultCheck2">
    Female
  </label>
</div>
        </div>

        <div class="input-group mb-3">
        <h4 class="col-3">highest Degree</h4>
        <select class="form-select col-9" aria-label="Default select example">
        <option selected>Open this select menu</option>
  <option value="1">One</option>
  <option value="2">Two</option>
  <option value="3">Three</option>
</select>
</div>

        <div class="input-group mb-3">
            <h4 class="col-3">CPI</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="CPI" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">University</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="University" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>  

        <div class="input-group mb-3">
        <h4 class="col-3">Passing Year</h4>
        <select class="form-select col-9" aria-label="Default select example">
        <option selected>Select Your Passing Year</option>
  <option value="1">One</option>
  <option value="2">Two</option>
  <option value="3">Three</option>
</select>
</div>

<input class="btn btn-primary" type="submit" value="Submit">
<input class="btn btn-primary" type="reset" value="Reset">

</div>



<div class="right col-6">
        <h1 class="h1 text-center">COVID-19 Vaccine Registration Form</h1>

        <div class="input-group flex-nowrap">
            <h4 class="col-3">First Name</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="First Name" aria-label="Username" aria-describedby="addon-wrapping">
        </div>

        <div class="input-group flex-nowrap">
            <h4 class="col-3">Last Name</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Last Name" aria-label="Username" aria-describedby="addon-wrapping">
        </div>

         <div class="input-group flex-nowrap">
            <h4 class="col-3">Aadhar Number</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Aadhar Number" aria-label="Username" aria-describedby="addon-wrapping">
        </div>

        <div class="input-group mb-3">
        <h4 class="col-3">Vaccine Name</h4>
        <select class="form-select col-9" aria-label="Default select example">
        <option selected>Please Select Vaccine Name</option>
  <option value="1">One</option>
  <option value="2">Two</option>
  <option value="3">Three</option>
</select>
</div>

<div class="input-group mb-3">
        <h4 class="col-3">Vaccination Center Name</h4>
        <select class="form-select col-9" aria-label="Default select example">
        <option selected>Please Select Vaccination Center Name</option>
  <option value="1">One</option>
  <option value="2">Two</option>
  <option value="3">Three</option>
</select>
</div>


<div class="input-group mb-3">
            <h4 class="col-3">Date of Dose</h4>
            <input type="date" class="form-control  mb-3 col-9" placeholder="Date of Dose" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <div class="input-group mb-3">
            <h4 class="col-3">Dose Number</h4>
            <input type="text" class="form-control  mb-3 col-9" placeholder="Dose" aria-label="Recipient’s username" aria-describedby="button-addon2">
        </div>

        <input class="btn btn-primary" type="submit" value="CLICK HERE">
        <input class="btn btn-primary" type="reset" value="CANCEL">
</div>
</main>
</body>
</html>
