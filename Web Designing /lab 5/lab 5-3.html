<!DOCTYPE html>
<html>
<head>
    <title>Invoice Layout</title>
</head>
<body>

<table border="2" width="1000" align="center" cellpadding="8">

    <!-- Top Section -->
    <tr>
        <td rowspan="4" colspan="4" align="center"><b>A</b></td>
        <td align="center">D</td>
        <td align="center">E</td>
    </tr>
    <tr>
        <td align="center">F</td>
        <td align="center">G</td>
    </tr>
    <tr>
        <td align="center">H</td>
        <td align="center">I</td>
    </tr>
    <tr>
        <td align="center">J</td>
        <td align="center">K</td>
    </tr>

    <tr>
        <td colspan="4" align="center"><b>B</b></td>
        <td colspan="2" rowspan="2" align="center"><b>L</b></td>
    </tr>

    <tr>
        <td colspan="4" align="center"><b>C</b></td>
    </tr>

    <!-- Table Header -->
    <tr>
        <th>SL</th>
        <th>Items</th>
        <th>Due Dt</th>
        <th>Qty</th>
        <th>Rate</th>
        <th>Per</th>
        <th>Dis%</th>
        <th>Amt</th>
    </tr>

    <!-- Empty Rows -->
    <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>

    <!-- Bottom Section -->
    <tr>
        <td colspan="6"><b>AMT IN WORD</b></td>
        <td colspan="2" align="right"><b>E. & O.E</b></td>
    </tr>

    <tr>
        <td colspan="4"><b>COMPANY NAME</b></td>
        <td colspan="4" rowspan="2"></td>
    </tr>

    <tr>
        <td colspan="4"></td>
    </tr>

</table>

</body>
</html>
