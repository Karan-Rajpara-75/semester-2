<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

.box{
  flex:1 1 45%;
  height:300px;
  border-radius:10px;
}

.linear-box{
  background:linear-gradient(to bottom, red, orange, yellow);
}

.radial-box{
  background:radial-gradient(circle, red, orange, yellow, green);
}

@media (max-width:768px){
  .box{
    flex:1 1 100%;
    height:250px;
  }
}

</style>
</head>
<body>

<div class="container">
  <div class="box linear-box"></div>
  <div class="box radial-box"></div>
</div>

</body>
</html>
