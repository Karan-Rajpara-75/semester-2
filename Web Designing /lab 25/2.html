<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
  <main>
    <div class="py-5 text-center">
        <img class="d-block img-fluid mx-auto" src="./OIP.jpeg" alt="Bootstrap" width="256" height="204">
      <h2>Checkout form</h2>
      <p class="lead">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eveniet labore, dolor consequatur exercitationem sequi consectetur rerum officia neque, architecto, adipisci praesentium quis culpa ullam quod fuga commodi? Repellendus, qui soluta.</p>
    </div>
      <div class="col-md-7 col-lg-8">
        <h4 class="mb-3">Billing address</h4>
        <form>
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label">First name</label>
              <input type="text" class="form-control">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Last name</label>
              <input type="text" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="Username">
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="you@example.com">
            </div>
            <div class="col-12">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" placeholder="1234 Main St">
            </div>
            <div class="col-12">
              <label class="form-label">Address 2</label>
              <input type="text" class="form-control" placeholder="Apartment or suite">
            </div>
            <div class="col-md-5">
              <label class="form-label">Country</label>
              <select class="form-select">
                <option>Choose...</option>
                <option>India</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">State</label>
              <select class="form-select">
                <option>Choose...</option>
                <option>Gujarat</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Zip</label>
              <input type="text" class="form-control">
            </div>
          </div>
    </div>
  </main>
</div>
</body>
</html>
