<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            height: 700px;
            width: 700px;
        }
        .box1{
            height: 12px;
            width: 12px;
            background-color: rgb(0, 0, 0);
            animation: num 10s  2s 2 alternate both;
        }
        .box2{
            height: 12px;
            width: 12px;
            background-color: rgb(41, 40, 40);
            animation: num 10s  2.1s 2 alternate both;
        }
        .box3{
            height: 12px;
            width: 12px;
            background-color: rgb(74, 73, 73);
            animation: num 10s  2.2s 2 alternate both;
        }
        .box4{
            height: 12px;
            width: 12px;
            background-color: rgb(112, 110, 110);
            animation: num 10s  2.3s 2 alternate both;
        }
        .box5{
            height: 12px;
            width: 12px;
            background-color: rgb(147, 146, 146);
            animation: num 10s  2.4s 2 alternate both;
        }
        @keyframes num{
           0%{
                margin-left: 0px;
                margin-top: 0px;
           }
           25%{
                margin-left: 0px;
                margin-top: 150px;
           }
           50%{
                margin-left: 150px;
                margin-top: 150px;
           }
           75%{
                margin-left: 150px;
                margin-top: 0px;
           }
           100%{
                margin-left: 0px;
                margin-top: 0px;
           }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    </div>
</body>
</html>
