<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .login-bg{
    background-image:url(./image.png);
    background-size:cover;
    background-position:center;
    height:500px;
}
</style>
</head>
<body class="bg-light">
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="row shadow bg-white w-75">
        <div class="col-md-6 text-white d-flex flex-column justify-content-center align-items-center text-center p-5 login-bg">
            <h6>Nice to see you again</h6>
            <h1 class="fw-bold display-5">WELCOME BACK</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit</p>
        </div>
        <div class="col-md-6 p-5">
            <h4 class="text-center mb-4 text-primary">Login Account</h4>
            <p class="fw-lighter fs-6">Lorem ipsum dolor sit amet consectetur adipisicing elit. </p>
            <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email ID">
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password">
            </div>
            <div class="d-flex justify-content-between mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Keep me signed in</label>
                </div>
                <a href="#">Already a member?</a>
            </div>
            <div class="d-grid">
                <button class="btn btn-primary rounded-pill">SUBSCRIBE</button>
            </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
