<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practical 10 - Part A</title>

    <!-- INTERNAL CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 1000px;
            margin: auto;
            background-color: white;
        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .menu {
            background-color: #333;
            text-align: center;
            padding: 10px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .content-area {
            display: flex;
        }

        .content {
            width: 70%;
            padding: 20px;
            background-color: #ffffff;
        }

        .sidebar {
            width: 30%;
            padding: 20px;
            background-color: #e6e6e6;
        }

        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>My Website Header</h1>
        </div>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>

        <div class="content-area">

            <div class="content">
                <h2>Main Content</h2>
                <p>
                    This webpage is designed using DIV tags and Internal CSS.
                    Practical No-10 Part-A example.
                </p>
            </div>

            <div class="sidebar">
                <h3>Sidebar</h3>
                <p>Additional Information</p>
            </div>

        </div>

        <div class="footer">
            <p>© 2025 DICA | Web Designing</p>
        </div>

    </div>

</body>
</html>
