<!DOCTYPE html>
<html>
<head>
    <title>Custom Animation</title>

    <style>
        .circle {
            width: 100px;
            height: 100px;
            background-color: blue;
            border-radius: 50%;
            position: relative;

            animation: bounce 4s infinite;
        }

        @keyframes bounce {
            0% {
                top: 0px;
                background-color: blue;
            }
            50% {
                top: 200px;
                background-color: green;
            }
            100% {
                top: 0px;
                background-color: blue;
            }
        }
    </style>

</head>
<body>

    <div class="circle"></div>

</body>
</html>
