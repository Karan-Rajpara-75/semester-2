<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main{
            height: 1000px;
            width: 1500px;
        }
        .box{
            background-color: black;
            height: 50vh;
            width: 70vw;
            margin-top: 100px;
            margin-left: auto;
        }
        .n1{
            height: 100px;
            width: 100px;
            border-radius: 100px;
            background-color: white;
            animation: num 10s  2s infinite alternate both;
        }
        @keyframes num{
             0%{
                margin-left: 0px;
                margin-top: 0px;
           }
           25%{
                margin-left: 0px;
                margin-top: 150px;
           }
           50%{
                margin-left: 150px;
                margin-top: 150px;
           }
           75%{
                margin-left: 150px;
                margin-top: 0px;
           }
           100%{
                margin-left: 0px;
                margin-top: 0px;
           }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box">
            <div class="n1"></div>
            <div class="n2"></div>
            <div class="n3"></div>
            <div class="n4"></div>
        </div>
    </div>
</body>
</html>
