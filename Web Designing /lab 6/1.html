<!DOCTYPE html>
<html>
<head>
    <title>Registration Forms</title>
</head>
<body>

<table width="100%" cellpadding="10">
<tr>
    <!-- LEFT FORM -->
    <td width="50%" valign="top">
        <h2>Student Registration</h2>

        <form>
        <table cellpadding="8">
            <tr>
                <td>FullName</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Mobile No</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea rows="4" cols="20"></textarea></td>
            </tr>
            <tr>
                <td>Nationality</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Date Of Birth</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>
            <tr>
                <td>Highest Degree</td>
                <td>
                    <select>
                        <option>Select Degree</option>
                        <option>Bachelor</option>
                        <option>Master</option>
                        <option>PhD</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>CPI</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>University</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Passing Year</td>
                <td>
                    <select>
                        <option>Select Your Passing Year</option>
                        <option>2022</option>
                        <option>2023</option>
                        <option>2024</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Cancel">
                </td>
            </tr>
        </table>
        </form>
    </td>

    <!-- RIGHT FORM -->
    <td width="50%" valign="top">
        <h2>COVID-19 Vaccine Registration Form</h2>

        <form>
        <table cellpadding="8">
            <tr>
                <td>First Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Aadhar Number</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Vaccine Name</td>
                <td>
                    <select>
                        <option>Please Select Vaccine Name</option>
                        <option>Covishield</option>
                        <option>Covaxin</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Vaccination Center Name</td>
                <td>
                    <select>
                        <option>Please Select Vaccination Center Name</option>
                        <option>Center 1</option>
                        <option>Center 2</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Date of Dose</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Dose Number</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="button" value="CLICK HERE">
                    <input type="reset" value="CANCEL">
                </td>
            </tr>
        </table>
        </form>
    </td>
</tr>
</table>

</body>
</html>
