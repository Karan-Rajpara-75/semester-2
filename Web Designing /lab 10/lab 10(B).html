<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
  font-family: Arial, sans-serif;
}

.container {
  width: 1000px;
  margin: auto;
  border: 1px solid #999;
}

.top {
  text-align: right;
  padding: 10px;
}

.top a {
  margin-left: 15px;
  text-decoration: none;
  color: blue;
}

.main {
  display: flex;
}

.sidebar {
  width: 200px;
  background: red;
}

.sidebar div {
  padding: 15px;
  border-bottom: 2px solid yellow;
  color: black;
  text-align: center;
  font-weight: bold;
}

.content {
  flex: 1;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.box {
  text-align: center;
  font-size: 12px;
}

.box img {
  width: 100%;
  height: 80px;
  object-fit: cover;
}

.footer {
  background: blue;
  color: white;
  padding: 10px;
}
</style>
</head>
<body>
    <div class="container">
        <div class="#top">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Login</a>
        </div>
        
        <div class="main">
            <div class="sidebar">
            <div>Home</div>
            <div>Placement</div>
            <div>Recuriment</div>
            <div>Facluty</div>
            <div>News</div>
            </div>

            <div class="content">
                <div class="box"><img src="./Dwarka.jpg"><br>Student 1</div>
                <div class="box"><img src="./Heritage.jpg"><br>Student 2</div>
                <div class="box"><img src="./Kaziranga.jpg"><br>Student 3</div>
                <div class="box"><img src="./Manali.jpg"><br>Student 4</div>
                <div class="box"><img src="./Darjeeling.avif"><br>Student 5</div>
            </div>
        </div>

        <div class="footer">&copy;Darshan University - Rajkot</div>
    </div>
</body>
</html>
