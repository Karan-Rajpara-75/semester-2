<!DOCTYPE html>
<html>
<head>
    <title>HTML Website Layout</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        .header {
            background: #c62828;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
        }

        .main {
            display: flex;
            margin: 20px;
        }

        .navigation {
            width: 15%;
            background: #2c3e99;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
        }

        .content {
            width: 55%;
            background: #ffeb3b;
            padding: 20px;
            font-size: 20px;
            text-align: center;
        }

        .sidebar {
            width: 20%;
            background: #0b6b3a;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
        }

        .footer {
            background: #29b6f6;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 22px;
            margin: 20px;
        }

        .layout-text {
            position: absolute;
            left: 10px;
            top: 200px;
            color: #b7d300;
            font-size: 20px;
            font-style: italic;
        }
    </style>

</head>
<body>

<div class="header">Header</div>

<div class="layout-text">Html<br>Website<br>Layout</div>

<div class="main">
    <div class="navigation">Navigation</div>
    <div class="content">Content</div>
    <div class="sidebar">Sidebar</div>
</div>

<div class="footer">Footer</div>

</body>
</html>
